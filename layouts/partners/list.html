{{ define "main" }}
<div class="container">
<article class="page">
  <h1 class="reveal in">{{ .Title }}</h1>
  {{ with .Content }}<div class="prose reveal in d1">{{ . }}</div>{{ end }}
  <div class="partner-grid">
    {{ range $i, $p := .Site.Data.partners }}
    <div class="partner reveal d{{ add (mod $i 4) 1 }}">
      <p class="partner-name">{{ $p.name }}</p>
      <p class="muted">{{ $p.type }}</p>
      <p class="partner-scope">{{ $p.scope }}</p>
    </div>
    {{ end }}
  </div>
</article>
</div>
{{ end }}
